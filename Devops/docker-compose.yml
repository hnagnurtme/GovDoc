services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: govdoc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ..
      dockerfile: Devops/Dockerfile.backend
    container_name: govdoc-backend
    restart: unless-stopped
    env_file:
      - ../Backend/.env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: law_chunks
      LOG_LEVEL: INFO
    depends_on:
      - qdrant
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: Devops/Dockerfile.frontend
    container_name: govdoc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  qdrant_data:
