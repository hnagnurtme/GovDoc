upstream govdoc_frontend {
    server frontend:80;
}

upstream govdoc_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Frontend app
    location / {
        proxy_pass http://govdoc_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API via prefix /api/v1
    location /api/v1/ {
        proxy_pass http://govdoc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
